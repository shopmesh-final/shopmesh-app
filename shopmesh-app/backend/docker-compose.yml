services:
  # ─── DynamoDB Local ───────────────────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:2.3.0
    container_name: shopmesh-dynamodb-local
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    networks:
      - shopmesh-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── DynamoDB Table Bootstrap ─────────────────────────────────────────────
  dynamodb-init:
    image: amazon/aws-cli:2.15.0
    container_name: shopmesh-dynamodb-init
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
    networks:
      - shopmesh-backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ENDPOINT="http://dynamodb-local:8000"

        # Create shopmesh-users table
        aws dynamodb create-table \
          --endpoint-url $$ENDPOINT \
          --table-name shopmesh-users \
          --attribute-definitions \
            AttributeName=userId,AttributeType=S \
            AttributeName=email,AttributeType=S \
          --key-schema AttributeName=userId,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[{
            "IndexName":"email-index",
            "KeySchema":[{"AttributeName":"email","KeyType":"HASH"}],
            "Projection":{"ProjectionType":"ALL"}
          }]' 2>/dev/null || echo "shopmesh-users table already exists"

        # Create shopmesh-products table
        aws dynamodb create-table \
          --endpoint-url $$ENDPOINT \
          --table-name shopmesh-products \
          --attribute-definitions \
            AttributeName=productId,AttributeType=S \
          --key-schema AttributeName=productId,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST 2>/dev/null || echo "shopmesh-products table already exists"

        # Create shopmesh-orders table
        aws dynamodb create-table \
          --endpoint-url $$ENDPOINT \
          --table-name shopmesh-orders \
          --attribute-definitions \
            AttributeName=order_id,AttributeType=S \
            AttributeName=user_id,AttributeType=S \
          --key-schema AttributeName=order_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[{
            "IndexName":"user_id-index",
            "KeySchema":[{"AttributeName":"user_id","KeyType":"HASH"}],
            "Projection":{"ProjectionType":"ALL"}
          }]' 2>/dev/null || echo "shopmesh-orders table already exists"

        echo "DynamoDB tables initialized successfully"

  # ─── Auth Service ─────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: shopmesh-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - LOCAL_MODE=true
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - DYNAMODB_USERS_TABLE=shopmesh-users
      - JWT_SECRET=local-dev-jwt-secret-change-in-production
      - JWT_EXPIRES_IN=24h
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    networks:
      - shopmesh-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Product Service ──────────────────────────────────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: shopmesh-products
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=development
      - LOCAL_MODE=true
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - DYNAMODB_PRODUCTS_TABLE=shopmesh-products
      - JWT_SECRET=local-dev-jwt-secret-change-in-production
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
    networks:
      - shopmesh-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─── Order Service ────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: shopmesh-orders
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - LOCAL_MODE=true
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - DYNAMODB_ORDERS_TABLE=shopmesh-orders
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - SQS_ORDER_QUEUE_URL=
      - SNS_ORDERS_TOPIC_ARN=
      - SNS_ALERTS_TOPIC_ARN=
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - shopmesh-backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Analytics Service ────────────────────────────────────────────────────
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: shopmesh-analytics
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - LOCAL_MODE=true
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - DYNAMODB_ORDERS_TABLE=shopmesh-orders
      - DYNAMODB_USERS_TABLE=shopmesh-users
      - DYNAMODB_PRODUCTS_TABLE=shopmesh-products
      - AUTH_SERVICE_URL=http://auth-service:3001
      - AWS_REGION=us-east-1
      # In production set LOCAL_MODE=false and ensure EC2 IAM role has bedrock:InvokeModel
      - BEDROCK_MODEL_ID=amazon.nova-lite-v1:0
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
    networks:
      - shopmesh-backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3004/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── AI Assistant Service ─────────────────────────────────────────────────
  ai-assistant-service:
    build:
      context: ./ai-assistant-service
      dockerfile: Dockerfile
    container_name: shopmesh-ai-assistant
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - LOCAL_MODE=true
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
      - AWS_REGION=us-east-1
      # In production set LOCAL_MODE=false and ensure EC2 IAM role has bedrock:InvokeModel and bedrock:Converse
      - BEDROCK_MODEL_ID=amazon.nova-lite-v1:0
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - shopmesh-backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3005/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

# ─── Networks ─────────────────────────────────────────────────────────────
networks:
  shopmesh-backend:
    driver: bridge
