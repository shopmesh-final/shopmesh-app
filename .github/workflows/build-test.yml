name: Build & Test

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      runtime:
        description: "node | python"
        required: true
        type: string

jobs:
  build-test:
    name: Build & Test — ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}

    steps:
      - uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Setup Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        if: inputs.runtime == 'node'
        run: |
          if [ -f "package-lock.json" ]; then npm ci; else npm install; fi

      - name: Run Node tests
        if: inputs.runtime == 'node'
        env:
          CI: "true"
        run: npm test --if-present

      - name: Build Node application
        if: inputs.runtime == 'node'
        run: npm run build --if-present

      # ── Python ────────────────────────────────────────────────────────────────
      - name: Setup Python
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ inputs.service_path }}/requirements.txt

      - name: Install Python dependencies
        if: inputs.runtime == 'python'
        run: pip install -r requirements.txt

      - name: Run Python tests
        if: inputs.runtime == 'python'
        run: |
          pip install pytest pytest-cov
          pytest --tb=short -v || { code=$?; [ $code -eq 5 ] && echo "No tests collected" || exit $code; }
