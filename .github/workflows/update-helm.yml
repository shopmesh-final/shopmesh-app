name: Update Helm Values

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  update-helm:
    name: Update Helm — ${{ inputs.service_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: shopmesh-final/shopmesh-gitops
          token:      ${{ secrets.GITOPS_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Compute short tag
        id: tag
        run: echo "short=$(echo '${{ inputs.image_tag }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update image.tag in values.yaml
        run: |
          VALUES="environments/prod/values/${{ inputs.service_name }}.yaml"
          yq e '.image.tag = "${{ steps.tag.outputs.short }}"' -i "${VALUES}"

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          VALUES="environments/prod/values/${{ inputs.service_name }}.yaml"
          git add "${VALUES}"
          if git diff --cached --quiet; then
            echo "No changes — tag already up to date"
            exit 0
          fi
          git commit -m "ci: update ${{ inputs.service_name }} image to ${{ steps.tag.outputs.short }}"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt ${i}"
              break
            fi
            if [ "${i}" -eq 5 ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi
            echo "Push rejected (attempt ${i}/5), rebasing onto origin/main..."
            git pull --rebase origin main
          done
